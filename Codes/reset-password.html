<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Seoul Bite</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="auth-container">
        <div class="text-center mb-3">
            <img src="../Assets/logo.svg" alt="Seoul Bite Logo" id="logo" style="width: 80px;">
            <h1 class="brand-name">Seoul Bite</h1>
        </div>

        <h2>Reset Password</h2>

        <!--
            Question 1b (vi): Reset Password hyperlink - allows the user to change
            their password associated with RegistrationData by matching their TRN.
        -->
        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="trn">Tax Registration Number (TRN)</label>
                <input type="text" id="trn" placeholder="000-000-000" required maxlength="11">
                <div class="error-message" id="trn-error"></div>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password *</label>
                <input type="password" id="newPassword" placeholder="Min 8 characters" required>
                <div class="error-message" id="newPassword-error"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password *</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <div class="error-message" id="confirmPassword-error"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                <button type="button" class="btn btn-secondary btn-block" id="cancel-btn">Cancel</button>
            </div>
        </form>

        <div class="auth-footer">
            <p><a href="index.html">Back to Login</a></p>
        </div>
    </main>

    <div id="toast" role="alert"></div>

    <script src="../js/common.js"></script>
    <script>
        /*
            Question 1b (vi): Reset Password functionality.
            Finds the user by TRN in RegistrationData and updates their password.
        */

        var resetForm       = document.getElementById('reset-form');
        var trnInput        = document.getElementById('trn');
        var newPassInput    = document.getElementById('newPassword');
        var confirmPassInput= document.getElementById('confirmPassword');
        var cancelBtn       = document.getElementById('cancel-btn');

        /* Auto-format TRN */
        trnInput.addEventListener('input', function() {
            var digits = this.value.replace(/\D/g, '');
            if (digits.length > 6) {
                this.value = digits.substring(0,3) + '-' + digits.substring(3,6) + '-' + digits.substring(6,9);
            } else if (digits.length > 3) {
                this.value = digits.substring(0,3) + '-' + digits.substring(3,6);
            } else {
                this.value = digits;
            }
        });

        cancelBtn.addEventListener('click', function() {
            resetForm.reset();
        });

        resetForm.addEventListener('submit', function(e) {
            e.preventDefault();

            var trnVal     = trnInput.value.trim();
            var newPass    = newPassInput.value;
            var confirmPass= confirmPassInput.value;
            var isValid    = true;

            /* Validate TRN format */
            if (!/^\d{3}-\d{3}-\d{3}$/.test(trnVal)) {
                document.getElementById('trn-error').textContent = 'Enter a valid TRN (000-000-000)';
                document.getElementById('trn-error').classList.add('show');
                trnInput.classList.add('input-error');
                isValid = false;
            } else {
                document.getElementById('trn-error').classList.remove('show');
                trnInput.classList.remove('input-error');
            }

            /* Validate new password */
            if (newPass.length < 8 || !/[a-zA-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
                document.getElementById('newPassword-error').textContent = 'Password must be at least 8 characters with letters and numbers';
                document.getElementById('newPassword-error').classList.add('show');
                newPassInput.classList.add('input-error');
                isValid = false;
            } else {
                document.getElementById('newPassword-error').classList.remove('show');
                newPassInput.classList.remove('input-error');
            }

            /* Validate passwords match */
            if (newPass !== confirmPass) {
                document.getElementById('confirmPassword-error').textContent = 'Passwords do not match';
                document.getElementById('confirmPassword-error').classList.add('show');
                confirmPassInput.classList.add('input-error');
                isValid = false;
            } else {
                document.getElementById('confirmPassword-error').classList.remove('show');
                confirmPassInput.classList.remove('input-error');
            }

            if (!isValid) return;

            /* Question 1b (vi): Find user by TRN in RegistrationData and update password */
            var users     = JSON.parse(localStorage.getItem('RegistrationData')) || [];
            var userIndex = -1;

            for (var i = 0; i < users.length; i++) {
                if (users[i].trn === trnVal) {
                    userIndex = i;
                    break;
                }
            }

            if (userIndex === -1) {
                document.getElementById('trn-error').textContent = 'No account found with that TRN';
                document.getElementById('trn-error').classList.add('show');
                trnInput.classList.add('input-error');
                return;
            }

            /* Update password and save back to RegistrationData */
            users[userIndex].password = newPass;
            localStorage.setItem('RegistrationData', JSON.stringify(users));

            /* Clear any login lockout */
            sessionStorage.removeItem('loginAttempts');

            showToast('Password reset successfully! Please login.', 'success');
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
