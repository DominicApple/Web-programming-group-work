<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Seoul Bite</title>
    <!-- CSS files - External stylesheets -->
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <!-- Skip link for keyboard navigation -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="auth-container">
        <!-- Logo and brand -->
        <div class="text-center mb-3">
            <img src="../Assets/logo.svg" alt="Seoul Bite Logo" id="logo" style="width: 80px;">
            <h1 class="brand-name">Seoul Bite</h1>
        </div>

        <h2>Login</h2>

        <!-- Login error message -->
        <div class="error-message" id="login-error"></div>

        <!-- Login Form -->
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
                <div class="error-message" id="username-error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <div class="error-message" id="password-error"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </main>

    <!-- Toast notification -->
    <div id="toast" role="alert"></div>

    <!-- JavaScript files -->
    <script src="../js/common.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
