<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#660000" stroke="#d4af37" stroke-width="3"/>
  
  <!-- Rice bowl shape -->
  <ellipse cx="50" cy="60" rx="30" ry="15" fill="#ffffff"/>
  <ellipse cx="50" cy="60" rx="25" ry="12" fill="#f5f5f5"/>
  
  <!-- Rice/food on top -->
  <ellipse cx="50" cy="55" rx="22" ry="10" fill="#ffffff"/>
  
  <!-- Chopsticks -->
  <line x1="25" y1="30" x2="45" y2="50" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="25" x2="50" y2="45" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Steam lines -->
  <path d="M40 35 Q38 30 40 25" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 32 Q48 27 50 22" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 35 Q58 30 60 25" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Text "SB" -->
  <text x="50" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d4af37">SB</text>
</svg>