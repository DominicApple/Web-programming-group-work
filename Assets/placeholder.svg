<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Background -->
  <rect width="300" height="200" fill="#1a1a1a"/>
  
  <!-- Plate/bowl outline -->
  <ellipse cx="150" cy="110" rx="60" ry="30" fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- Bowl shape -->
  <path d="M90 110 Q90 140 150 140 Q210 140 210 110" fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- Chopsticks -->
  <line x1="100" y1="70" x2="140" y2="100" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="65" x2="150" y2="95" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="150" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Add your image here</text>
</svg>